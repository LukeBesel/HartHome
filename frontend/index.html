<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>HartHome — The Command Center for Your Home</title>
    <meta name="description" content="HartHome brings your family's calendar, chores, goals, rewards, groceries, bills, budget, utilities, and car & home maintenance together on one beautiful screen — at home or on the go." />
    <meta property="og:title" content="HartHome — The Command Center for Your Home" />
    <meta property="og:description" content="One calm home screen for the whole family. Calendar, chores, rewards, groceries, bills, budget, and asset maintenance — on any display." />
    <meta property="og:type" content="website" />
    <script>
      try {
        var dm = localStorage.getItem('hh_dark_mode');
        var dark = dm != null ? dm === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
